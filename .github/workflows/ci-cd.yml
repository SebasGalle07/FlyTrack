name: FlyTrack CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_NAME_LC: dummy

jobs:
  # ──────────────────────────────────────────────
  # Etapa 1: Build, test y análisis de calidad
  # ──────────────────────────────────────────────
  build-test-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run quality analysis (Ruff)
        run: ruff check .

      - name: Run automated tests
        run: pytest --tb=short -q

  # ──────────────────────────────────────────────
  # Etapa 2: Build y push de imagen Docker a GHCR
  # ──────────────────────────────────────────────
  docker-image:
    runs-on: ubuntu-latest
    needs: build-test-quality
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────
  # Etapa 3: Deploy a staging (EC2 vía SSH)
  # ──────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_LC=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2 staging
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY_SCRIPT'
            mkdir -p ~/flytrack-staging
            cd ~/flytrack-staging
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_LC }}:latest
            docker stop flytrack-api 2>/dev/null || true
            docker rm flytrack-api 2>/dev/null || true
            docker run -d --name flytrack-api -p 8000:8000 --restart unless-stopped ${{ env.IMAGE_LC }}:latest
            echo "Waiting for health check..."
            sleep 15
            curl -f http://localhost:8000/health || exit 1
            echo "Staging deployment successful"
          DEPLOY_SCRIPT

  # ──────────────────────────────────────────────
  # Etapa 4: Deploy a producción (EC2 vía SSH)
  # ──────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_LC=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2 production
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY_SCRIPT'
            mkdir -p ~/flytrack
            cd ~/flytrack
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_LC }}:latest
            docker stop flytrack-api 2>/dev/null || true
            docker rm flytrack-api 2>/dev/null || true
            docker run -d --name flytrack-api -p 8000:8000 --restart unless-stopped ${{ env.IMAGE_LC }}:latest
            echo "Waiting for health check..."
            sleep 15
            curl -f http://localhost:8000/health || exit 1
            echo "Production deployment successful"
          DEPLOY_SCRIPT
